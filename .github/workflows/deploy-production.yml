name: Deploy Tatsumi Site to Production

on:
  push:
    branches:
      - deployment/production

jobs:
  deploy:
    name: FTP Deploy Tatsumi Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.DS_Store
            **/.git*
            **/.git*/**
            .github/**
            .claude/**
            docs/**
            20240308/**
            CLAUDE.md
            README.md
            FINDER.DAT
            RESOURCE.FRK/**
            tatsumi/**
